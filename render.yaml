services:
  - type: web
    name: rag-api
    env: python
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: python backend/run.py

    build:
      envVars:
        - key: PYTHON_VERSION
          value: 3.10.13

    envVars:
      - key: HF_API_TOKEN
        sync: false

    autoDeploy: true