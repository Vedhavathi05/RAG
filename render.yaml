services:
  - type: web
    name: rag-api
    env: python
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: python backend/run.py

    envVars:
      - key: HF_API_TOKEN
        sync: false

      # 👇 FORCE PYTHON VERSION
      - key: PYTHON_VERSION
        value: 3.10.13

    autoDeploy: true